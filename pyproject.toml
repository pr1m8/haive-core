[tool.poetry.group.chat-models]
optional = true

[tool.poetry.group.chat-models.dependencies]
langchain-google-vertexai = "^2.0.24"


# Tool configurations - respect .gitignore in this package
[tool.ruff]
line-length = 100
target-version = "py312"
respect-gitignore = true
exclude = ["__pycache__", ".mypy_cache", ".pytest_cache", ".ruff_cache"]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "W",
  "I",
  "N",
  "UP",
  "B",
  "A",
  "C4",
  "PIE",
  "T20",
  "Q",
  "SIM",
  "ARG",
  "ERA",
  "PL",
  "RUF",
]
ignore = ["E501", "D100", "D104", "D107"]

[tool.mypy]
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
strict_optional = true
warn_redundant_casts = true
warn_unused_ignores = true

[tool.trailrunner]
exclude = [
  "__pycache__",
  # Exclude Trunk's cache so Fixit won't follow it
  "\\.cache/trunk/.*",
  # Or if you have a .trunk folder:
  "\\.trunk/.*",
]

[tool.poetry.group.docs.dependencies]
# Use the shared pydevelop-docs system (contains all 43+ Sphinx extensions)
pydevelop-docs = { path = "../../tools/pydevelop-docs", develop = true }
sphinx = "^8.2.3"
sphinx-autoapi = "^3.6.0"
sphinx-autodoc-typehints = "^3.1.0"
autodoc-pydantic = "^2.0.1"
furo = "^2024.8.6"
myst-parser = "^4.0.1"
sphinx-copybutton = "^0.5.2"
sphinx-togglebutton = "^0.3.2"
sphinx-design = "^0.6.1"
sphinx-tabs = "^3.4.5"
sphinx-inline-tabs = "^2023.4.21"
sphinxcontrib-mermaid = "^1.0.0"
sphinxcontrib-plantuml = "^0.30"
sphinxcontrib-blockdiag = "^3.0.0"
sphinxcontrib-seqdiag = "^3.0.0"
# sphinx-codeautolink = "^0.17.0"  # Disabled - incompatible with Python 3.10+ union syntax
sphinx-exec-code = "^0.16"
sphinx-runpython = "^0.4.0"
sphinx-sitemap = "^2.6.0"
sphinx-last-updated-by-git = "^0.3.8"
sphinxext-opengraph = "^0.10.0"
sphinx-reredirects = "^1.0.0"
