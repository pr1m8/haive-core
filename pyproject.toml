[tool.poetry]
name = "haive-core"
version = "0.1.0"
description = "haive-core for Haive framework"
authors = ["pr1m8 <william.astley@algebraicwealth.com>"]
license = "MIT"
readme = "README.md"
packages = [{ include = "haive", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.12,<3.13"
# Core framework dependencies only
pydantic = "^2.10.6"
langchain = "^0.3.20"
langchain-core = "^0.3.44"
langgraph = "^0.3.5"
langchain-community = "^0.3.27"
langchain-huggingface = "^0.3.0"
pre-commit = "^4.2.0"
langgraph-checkpoint-postgres = "^2.0.23"
pymupdf4llm = "^0.0.27"
streamlit = "^1.47.1"
plotly = "^6.2.0"


[tool.poetry.group.dev.dependencies]
pytest = "^8.3.5"
black = "^25.1.0"
isort = "^6.0.1"
mypy = "^1.15.0"
pytest-sugar = "^1.0.0"
pytest-asyncio = "^0.26.0"
allure-pytest = "^2.14.2"
pytest-clarity = "^1.0.1"
pytest-html = "^4.1.1"

# Development tools - available to all packages!
#haive-cli = {path = "../../tools/haive-cli", develop = true}
#haive-dev = {path = "../../tools/haive-dev", develop = true}
#haive-testing = {path = "../../tools/haive-testing", develop = true}
#pydevelop-docs = {path = "../../tools/pydevelop-docs", develop = true}
pyment = "^0.3.3"
docstring-parser = "^0.17.0"


[tool.poetry.extras]
# Individual provider extras
openai = ["langchain-openai"]
anthropic = ["langchain-anthropic"]
google = ["langchain-google-genai", "langchain-google-vertexai"]
azure = ["langchain-openai"]
aws = ["langchain-aws"]
mistral = ["langchain-mistralai"]
groq = ["langchain-groq"]
