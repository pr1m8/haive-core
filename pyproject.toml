[tool.poetry]
name = "haive-core"
version = "0.1.0"
description = "haive-core for Haive framework"
authors = ["pr1m8 <william.astley@algebraicwealth.com>"]
license = "MIT"
readme = "README.md"
packages = [{ include = "haive", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.12,<3.13"
# Core framework dependencies only
pydantic = "^2.10.6"
langchain = "^0.3.20"
langchain-core = "^0.3.44"
langgraph = "^0.3.5"


[tool.poetry.group.dev.dependencies]
pytest = "^8.3.5"
black = "^25.1.0"
isort = "^6.0.1"
mypy = "^1.15.0"
pytest-sugar = "^1.0.0"
pytest-asyncio = "^0.26.0"
allure-pytest = "^2.14.2"
pytest-clarity = "^1.0.1"
pytest-html = "^4.1.1"


[tool.poetry.group.chat-models.dependencies]
langchain-google-vertexai = "^2.0.24"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
