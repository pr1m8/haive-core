  "langchain-milvus",
  "langchain-postgres",
  "faiss-cpu",
  "cohere",
  "azure-search-documents",
  "boto3",
  "tavily-python",
  "arxiv",
  "wikipedia",
  "metal_sdk",
  "pyvespa",
  "zep-python",
  "scikit-learn",
  "google-search-results",
  "google-cloud-documentai",
  "docarray",
  "thirdai",
  "llama-index",
]

