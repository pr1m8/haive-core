[pytest]
minversion = 7.0

testpaths = tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -ra
    -q
    --show-capture=all
    --tb=short
    --maxfail=5
    --html=logs/latest/report.html  # Save report in the run directory
    --self-contained-html
    --alluredir=logs/latest/allure-results
    --durations=10
    --strict-markers
    --junitxml=logs/latest/junit.xml  # Add JUnit XML output

log_cli = False
log_date_format = %Y-%m-%d %H:%M:%S

pythonpath = .

markers =
    slow: marks tests as slow (>1s)
    integration: marks tests that require external services
    smoke: marks critical path tests for quick verification
    regression: marks tests that verify fixed bugs
    unit: marks isolated unit tests
    graph: marks graph-related tests
    engine: marks engine-related tests

required_plugins =
    pytest-sugar>=0.9.7
    pytest-html>=4.1.1
    allure-pytest>=2.14.0

norecursedirs =
    .git
    .venv
    dist
    build
    logs
    __pycache__

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ImportWarning
    ignore::ResourceWarning